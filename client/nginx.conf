server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/xml application/xml+rss
        application/javascript application/json image/svg+xml application/manifest+json;

    # Hashed assets: cache forever, never revalidate
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Other static assets: 7-day cache
    location ~* \.(woff2?|svg|ico|webmanifest|png|jpg|jpeg|webp)$ {
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # HTML and everything else: always revalidate
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
