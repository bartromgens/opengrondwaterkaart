services:
  db:
    image: postgis/postgis:17-3.5
    ports:
      - "127.0.0.1:5436:5432"
    environment:
      POSTGRES_DB: opengrondwaterkaart
      POSTGRES_USER: opengrondwaterkaart
      POSTGRES_PASSWORD: opengrondwaterkaart
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengrondwaterkaart -d opengrondwaterkaart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_local:
