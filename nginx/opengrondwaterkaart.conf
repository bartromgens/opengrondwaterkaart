# VPS nginx configuration for opengrondwaterkaart
#
# Initial setup (first-time — certificates don't exist yet):
#   1. Install certbot:    sudo apt install certbot python3-certbot-nginx
#   2. Copy only the HTTP block to nginx so it can start without certificates:
#        sudo bash -c 'cat > /etc/nginx/sites-available/opengrondwaterkaart' << 'EOF'
#        server {
#            listen 80;
#            server_name opengrondwaterkaart.nl www.opengrondwaterkaart.nl;
#            location /.well-known/acme-challenge/ { root /var/www/html; }
#            location / { return 301 https://opengrondwaterkaart.nl$request_uri; }
#        }
#        EOF
#   3. Enable & reload:    sudo ln -s /etc/nginx/sites-available/opengrondwaterkaart /etc/nginx/sites-enabled/
#                          sudo nginx -t && sudo systemctl reload nginx
#   4. Obtain certificate: sudo certbot certonly --webroot -w /var/www/html -d opengrondwaterkaart.nl -d www.opengrondwaterkaart.nl
#   5. Copy this full file: sudo cp opengrondwaterkaart.conf /etc/nginx/sites-available/opengrondwaterkaart
#   6. Test & reload:      sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name opengrondwaterkaart.nl www.opengrondwaterkaart.nl;

    # Allow certbot webroot renewals
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://opengrondwaterkaart.nl$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.opengrondwaterkaart.nl;

    ssl_certificate /etc/letsencrypt/live/opengrondwaterkaart.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opengrondwaterkaart.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://opengrondwaterkaart.nl$request_uri;
}

server {
    listen 443 ssl http2;
    server_name opengrondwaterkaart.nl;

    ssl_certificate /etc/letsencrypt/live/opengrondwaterkaart.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opengrondwaterkaart.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://127.0.0.1:8060;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8060;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8060;
    }

    location / {
        proxy_pass http://127.0.0.1:3060;
    }
}
