services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: opengrondwaterkaart
      POSTGRES_USER: opengrondwaterkaart
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengrondwaterkaart -d opengrondwaterkaart"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8060:8000"
    volumes:
      - ./config/settings_local.py:/app/config/settings_local.py:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3060:80"
    restart: unless-stopped

volumes:
  postgres_data:
